# 1日2回 JST 6:00 と JST 18:00 に番組データを取り込む（旧 Vercel cron の置き換え）。
# Actions ランナーで scripts/ingest.ts を直接実行するため、Workers の実行時間制限を受けない。
# エンリッチ処理（ポスター・人気度・スコア）は cron-enrich.yml に分離している。
# 必要な GitHub Secrets: NEXT_PUBLIC_SUPABASE_URL / SUPABASE_SERVICE_ROLE_KEY / ANNICT_TOKEN
name: cron-ingest

on:
  schedule:
    - cron: "0 9,21 * * *" # JST 18:00 (UTC 09:00) と JST 6:00 (UTC 21:00)
  workflow_dispatch:

concurrency:
  group: cron-ingest
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run ingest
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ANNICT_TOKEN: ${{ secrets.ANNICT_TOKEN }}
          SYOBOI_BACKFILL: "true"
