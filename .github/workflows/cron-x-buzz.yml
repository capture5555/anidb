# 6時間おきに、アニメのXバズを収集する。未設定ならスキップ。
# 収集モード(優先順):
#   Mode B (Hermes): secrets.HERMES_HOME_B64 があれば ~/.hermes を復元し、
#     uvx --from hermes-agent の x_search_tool を呼ぶ(xAI公認 / X Premium OAuth クォータ)。
#   Mode A (XAI):     Hermes 未設定時のフォールバック。XAI_API_KEY か OAuth で Grok を呼ぶ。
# サブスクのクォータを節約するため実行頻度は控えめ(6h)。
# 必要な GitHub Secrets:
#   NEXT_PUBLIC_SUPABASE_URL / SUPABASE_SERVICE_ROLE_KEY
#   [Mode B] HERMES_HOME_B64
#     = ローカルで `uvx --from hermes-agent hermes auth add xai-oauth` 後、
#       `tar czf - -C ~ .hermes | base64 -w0` の出力を Secret に登録。
#   [Mode B 任意] GH_SECRETS_PAT
#     = Secrets:write 権限を持つ fine-grained PAT。設定すると実行ごとに更新後の
#       ~/.hermes を HERMES_HOME_B64 へ自動で書き戻し、OAuth トークンの失効を防ぐ
#       （未設定なら書き戻しはスキップし、従来どおり手動再認証が必要）。
#   [Mode A] XAI_API_KEY（有料APIキー。空でも可） もしくは XAI_REFRESH_TOKEN + XAI_OAUTH_CLIENT_ID
#     ※ XAI_REFRESH_TOKEN はローカルで `npm run xai-login` を実行して取得する。
name: cron-x-buzz

on:
  schedule:
    - cron: "45 */3 * * *" # 3時間おき（生ポスト harvest 蓄積のため頻度UP。~25クエリ/回・サブスク枠~30/2h以内）
  workflow_dispatch:

concurrency:
  group: cron-x-buzz
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    # 12作品 × 約40秒 ≈ 8分 ＋ uvx の初回ウォームアップを見込んで余裕を持たせる。
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      # Hermes モード(x_search_tool)を uvx で呼ぶために uv をインストール。
      - uses: astral-sh/setup-uv@v5
      - run: npm ci

      # secrets は if: で直接使えないため、まず env に移してからガードする。
      # HERMES_HOME_B64 があれば ~/.hermes を復元し HERMES_X_ENABLED=1 を後続に伝播する。
      - name: Restore Hermes credentials (Mode B)
        env:
          HERMES_HOME_B64: ${{ secrets.HERMES_HOME_B64 }}
        if: env.HERMES_HOME_B64 != ''
        run: |
          echo "$HERMES_HOME_B64" | base64 -d | tar xz -C ~
          echo "HERMES_X_ENABLED=1" >> "$GITHUB_ENV"

      # 初回のパッケージ解決を済ませておく（タイムアウトに含めないため、収集の前に温める）。
      - name: Warm up hermes env (Mode B)
        if: env.HERMES_X_ENABLED == '1'
        continue-on-error: true
        run: uvx --from hermes-agent python -c "print('hermes env ready')"

      - run: npm run collect-x-buzz
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          # Mode A(フォールバック)用。Hermes 未設定時にのみ使われる。
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          XAI_REFRESH_TOKEN: ${{ secrets.XAI_REFRESH_TOKEN }}
          XAI_OAUTH_CLIENT_ID: ${{ secrets.XAI_OAUTH_CLIENT_ID }}
          # ~15作品 + ~12話数 ≈ 29クエリ/回（3hごと）。話数別は人気度降順で採用するため
          # 人気タイトルの最新話を優先カバー。2連続実行(~54)でもレート制限に当たらず余裕を確認済み。
          X_BUZZ_LIMIT: "15"
          X_EPISODE_BUZZ_LIMIT: "12"

      # 実行中に hermes-agent が更新（ローテーション）した OAuth トークンを Secret へ
      # 書き戻し、次回以降の失効を防ぐ。GH_SECRETS_PAT(Secrets:write) が無ければ静かにスキップ。
      # always(): 一部クエリが失敗しても、リフレッシュ済みの新トークンは捕捉したいので常に実行。
      - name: Persist refreshed Hermes credentials (Mode B)
        if: ${{ always() && env.HERMES_X_ENABLED == '1' }}
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GH_SECRETS_PAT }}
          GH_REPO: ${{ github.repository }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "GH_SECRETS_PAT 未設定のため書き戻しをスキップ（手動再認証が必要なモード）"
            exit 0
          fi
          if [ ! -d "$HOME/.hermes" ]; then
            echo "~/.hermes が無いためスキップ"
            exit 0
          fi
          tar czf - -C ~ .hermes | base64 -w0 \
            | gh secret set HERMES_HOME_B64 --repo "$GH_REPO"
          echo "HERMES_HOME_B64 を更新後の認証情報で書き戻しました"
