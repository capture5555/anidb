# 1日2回 ingest の30分後にエンリッチ処理を実行する（ポスター・人気度・スコア補完）。
# 各ステップは continue-on-error で独立実行し、1ステップの失敗が後続をブロックしない。
# ENRICH_LIMIT で1回あたりの処理上限を設定し、タイムアウトを防ぐ。
# 必要な GitHub Secrets: NEXT_PUBLIC_SUPABASE_URL / SUPABASE_SERVICE_ROLE_KEY / ANNICT_TOKEN
name: cron-enrich

on:
  schedule:
    - cron: "30 9,21 * * *" # JST 18:30 (UTC 09:30) と JST 6:30 (UTC 21:30)
  workflow_dispatch:

concurrency:
  group: cron-enrich
  cancel-in-progress: false

jobs:
  enrich:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Enrich posters (AniList, poster_url が未設定の作品のみ)
        continue-on-error: true
        run: npm run enrich-posters
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ENRICH_LIMIT: "300"
      - name: Enrich popularity (Annict watchers_count, 今期+来期)
        continue-on-error: true
        run: npm run enrich-popularity
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ANNICT_TOKEN: ${{ secrets.ANNICT_TOKEN }}
          ENRICH_LIMIT: "300"
      - name: Enrich scores (AniList + MAL/Jikan, anilist_score が未設定の作品のみ)
        continue-on-error: true
        run: npm run enrich-scores
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ENRICH_LIMIT: "300"
