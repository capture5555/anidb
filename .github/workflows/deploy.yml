# main への push で Cloudflare Workers へデプロイする。
# 必要な GitHub Secrets:
#   CLOUDFLARE_API_TOKEN / CLOUDFLARE_ACCOUNT_ID
#   NEXT_PUBLIC_APP_URL / NEXT_PUBLIC_SUPABASE_URL / NEXT_PUBLIC_SUPABASE_ANON_KEY
#   （NEXT_PUBLIC_* はビルド時にクライアントへ埋め込まれるため、ここで渡す必要がある）
# ランタイム秘密値（SUPABASE_SERVICE_ROLE_KEY / GOOGLE_CLIENT_SECRET / SESSION_SECRET）は
# `npx wrangler secret put` で Cloudflare 側に登録する（このワークフローでは扱わない）。
name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Build (OpenNext for Cloudflare)
        run: npx opennextjs-cloudflare build
        env:
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          DATA_PROVIDER: supabase
      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
